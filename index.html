
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GTM OS</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f9f8f6;color:#1a1a1a;min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:2rem 1.5rem}
.tabs{display:flex;gap:0;margin-bottom:2rem;border-bottom:1px solid #e5e5e5}
.tab{padding:10px 20px;font-size:14px;cursor:pointer;border:none;background:none;color:#888;border-bottom:2px solid transparent;margin-bottom:-1px}
.tab.active{color:#1a1a1a;border-bottom-color:#1a1a1a;font-weight:500}
.tab:hover{color:#333}
.panel{display:none}.panel.active{display:block}
h2{font-size:18px;font-weight:500;margin-bottom:4px}
.subtitle{font-size:13px;color:#888;margin-bottom:1.5rem}
.controls{display:flex;gap:8px;margin-bottom:1rem;flex-wrap:wrap;align-items:center}
.filter-btn{padding:5px 13px;border-radius:99px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#333}
.filter-btn:hover{border-color:#999}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.toggle-btn{padding:5px 13px;border-radius:99px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#555}
.toggle-btn.on{background:#fef3c7;color:#92400e;border-color:#fcd34d}
.spacer{flex:1}
.icon-btn{padding:5px 13px;border-radius:99px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#555}
.icon-btn:hover{background:#f5f5f5}
.queue-label{font-size:13px;color:#888;margin-bottom:10px}
.toast{position:fixed;bottom:1.5rem;right:1.5rem;background:#1a1a1a;color:#fff;padding:10px 18px;border-radius:8px;font-size:13px;opacity:0;transition:opacity .3s;pointer-events:none;z-index:999;max-width:300px}
.toast.show{opacity:1}
.upload-zone{border:1.5px dashed #ddd;border-radius:10px;padding:1.25rem 1.5rem;margin-bottom:1.5rem;background:#fff}
.upload-zone h3{font-size:13px;font-weight:500;color:#555;margin-bottom:10px}
.upload-row{display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.upload-btn{position:relative;overflow:hidden;padding:7px 14px;border-radius:7px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#333}
.upload-btn:hover{background:#f5f5f5}
.upload-btn input{position:absolute;inset:0;opacity:0;cursor:pointer}
.upload-status{font-size:12px;color:#22a06b;margin-top:8px;width:100%}
.loading{padding:3rem;text-align:center;color:#aaa;font-size:14px}
.empty{padding:3rem;text-align:center;color:#aaa;font-size:14px}
.progress-bar{width:100%;height:4px;background:#eee;border-radius:2px;margin-top:8px;overflow:hidden}
.progress-fill{height:100%;background:#1a1a1a;border-radius:2px;transition:width .3s}
.upsert-results{margin-top:1rem}
.result-row{display:flex;justify-content:space-between;align-items:center;padding:10px 14px;background:#fff;border:1px solid #eee;border-radius:8px;margin-bottom:6px;font-size:13px}
.result-new{border-left:3px solid #22a06b}
.result-update{border-left:3px solid #2563eb}
.result-skip{border-left:3px solid #ddd;opacity:.5}
.tag{font-size:11px;padding:2px 8px;border-radius:99px}
.tag-new{background:#d1fae5;color:#065f46}
.tag-update{background:#dbeafe;color:#1d4ed8}
.tag-skip{background:#f3f4f6;color:#888}
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:1.5rem}
.stat{background:#fff;border-radius:8px;border:1px solid #eee;padding:12px 14px}
.stat-label{font-size:11px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.03em}
.stat-value{font-size:24px;font-weight:500}
table{width:100%;border-collapse:collapse;font-size:13px;background:#fff;border-radius:10px;overflow:hidden;border:1px solid #eee}
th{text-align:left;padding:10px 12px;font-size:11px;text-transform:uppercase;letter-spacing:.04em;color:#888;font-weight:500;border-bottom:1px solid #eee;white-space:nowrap;cursor:pointer;user-select:none}
th:hover{color:#333}
th.sorted{color:#1a1a1a}
td{padding:10px 12px;border-bottom:.5px solid #f0f0f0;vertical-align:top}
tr:last-child td{border-bottom:none}
tr.data-row:hover td{background:#fafafa;cursor:pointer}
tr.data-row.expanded td{background:#f9f8f6}
tr.expand-row td{padding:0;background:#f9f8f6}
.expand-inner{padding:14px 16px;border-top:.5px solid #eee}
.msg-box{background:#fff;border:1px solid #eee;border-radius:8px;padding:12px 14px;font-size:13px;line-height:1.65;margin-bottom:10px;white-space:pre-wrap;color:#1a1a1a;min-height:70px;width:100%}
.row-actions{display:flex;gap:8px;flex-wrap:wrap}
.btn{padding:6px 14px;border-radius:7px;font-size:13px;cursor:pointer;border:1px solid #ddd;background:#fff;color:#333;transition:all .12s}
.btn:hover{background:#f5f5f5}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{background:#333}
.btn.success{background:#d1fae5;color:#065f46;border-color:#a7f3d0}
.td-name{font-weight:500;min-width:120px}
.td-company{color:#555;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.td-role{color:#888;max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pill{display:inline-block;font-size:11px;padding:2px 8px;border-radius:99px;white-space:nowrap}
.p-consumer{background:#dbeafe;color:#1d4ed8}
.p-platform{background:#d1fae5;color:#065f46}
.p-physical{background:#fef3c7;color:#92400e}
.p-other{background:#f3f4f6;color:#555}
.p-none{background:#f3f4f6;color:#666}
.p-notcontacted{background:#f3f4f6;color:#666}
.p-sent{background:#dbeafe;color:#1d4ed8}
.p-replied{background:#d1fae5;color:#065f46}
.p-meeting{background:#fef3c7;color:#92400e}
.p-interview{background:#fce7f3;color:#9d174d}
.p-closed{background:#f3f4f6;color:#999}
.score-high{font-weight:600;color:#065f46}
.score-mid{color:#1a1a1a}
.score-low{color:#aaa}
.warmth-strong{color:#9d174d;font-weight:500}
.warmth-warm{color:#92400e}
.warmth-cold{color:#aaa}
.pagination{display:flex;gap:8px;align-items:center;margin-top:1rem;justify-content:center;flex-wrap:wrap}
.page-btn{padding:5px 12px;border-radius:7px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer}
.page-btn:hover{background:#f5f5f5}
.page-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.page-info{font-size:13px;color:#888}
.search-input{min-width:180px;padding:6px 12px;border-radius:7px;border:1px solid #ddd;font-size:13px;background:#fff}
.search-input:focus{outline:none;border-color:#999}
.bulk-bar{display:none;align-items:center;gap:8px;padding:10px 14px;background:#1a1a1a;border-radius:8px;margin-bottom:10px;flex-wrap:wrap}
.bulk-bar.visible{display:flex}
.bulk-label{font-size:13px;color:#fff;margin-right:4px}
.bulk-btn{padding:5px 13px;border-radius:99px;border:1px solid rgba(255,255,255,0.25);background:transparent;font-size:12px;cursor:pointer;color:#fff}
.bulk-btn:hover{background:rgba(255,255,255,0.15)}
.bulk-btn.danger{border-color:#f87171;color:#f87171}
.bulk-btn.danger:hover{background:rgba(248,113,113,0.15)}
.row-check{width:16px;height:16px;cursor:pointer;accent-color:#1a1a1a}
@media(max-width:600px){.stats{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="app">
  <div class="tabs">
    <button class="tab active" onclick="switchTab('explorer',this)">Network</button>
    <button class="tab" onclick="switchTab('upsert',this)">Sync</button>

  <!-- TAB 1: EXPLORER / NETWORK -->
  <div class="panel active" id="tab-explorer">

      <button class="icon-btn" onclick="loadExplorer()">Refresh</button>

  <!-- TAB 2: SYNC -->
  <div class="panel" id="tab-upsert">
    <h2>Sync network</h2>
    <p class="subtitle">Upload your LinkedIn CSV to sync new connections into Airtable</p>
    <div class="upload-zone">
      <h3>Upload LinkedIn CSV</h3>
      <div class="upload-row">
        <label class="upload-btn">Choose file<input type="file" accept=".csv" id="li-upload"></label>
        <div id="upsert-status" class="upload-status"></div>
      </div>
      <div class="progress-bar" id="upsert-progress-bar" style="display:none">
        <div class="progress-fill" id="upsert-progress-fill" style="width:0%"></div>
      </div>
    </div>
    <div class="stats" id="upsert-stats" style="display:none">
      <div class="stat"><div class="stat-label">In CSV</div><div class="stat-value" id="us-csv">0</div></div>
      <div class="stat"><div class="stat-label">New</div><div class="stat-value" id="us-new">0</div></div>
      <div class="stat"><div class="stat-label">Updated</div><div class="stat-value" id="us-updated">0</div></div>
      <div class="stat"><div class="stat-label">Skipped</div><div class="stat-value" id="us-skipped">0</div></div>
    </div>
    <div id="upsert-results"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const AT_TOKEN = "patguPO1PluxJKr5O.ca16ba80928fc3767cc28e9bee32f09b172e31f5944914b3b30a42b8d55bf54d";
const AT_BASE = "appm94Nanu5eZgveU";
const AT_PEOPLE = "tbl43qHrT8yJEpl0u";

const TARGET_SECTORS = {
  'Consumer Tech':['meta','facebook','instagram','twitter','tiktok','snap','snapchat','reddit','discord','pinterest','nextdoor','spotify','netflix','twitch','youtube','soundcloud','substack','duolingo','bumble','hinge','match','tinder','roblox','airbnb','etsy','ebay','whatnot','depop','poshmark','vinted','stockx','doordash','instacart','gopuff','grubhub','uber','lyft','shopify','shopmy','robinhood','coinbase','chime','venmo','wise','revolut','nubank','monzo','openai','character.ai','canva','peloton','headspace','calm','linkedin'],
  'Platform Infra':['stripe','plaid','adyen','checkout.com','braintree','marqeta','lithic','finix','unit','column','modern treasury','mercury','increase','twilio','sendgrid','bandwidth','vonage','sinch','auth0','okta','stytch','persona','alloy','socure','segment','rudderstack','amplitude','mixpanel','databricks','snowflake','fivetran','airbyte','datadog','new relic','grafana','sentry','pagerduty','cloudflare','fastly','akamai','github','gitlab','vercel','netlify','supabase','planetscale','neon','salesforce','hubspot','notion','linear','figma','miro','anthropic','cohere','mistral','zendesk','intercom','contentful','palantir','relay'],
  'Physical World':['anduril','shield ai','l3harris','lockheed','raytheon','northrop','boeing','general dynamics','bae systems','spacex','rocket lab','relativity space','axiom space','blue origin','commonwealth fusion','helion','terrapower','oklo','kairos','nextera','peak energy','nvidia','amd','intel','tsmc','asml','applied materials','coreweave','crusoe','lambda labs','etched','groq','cerebras','d-matrix','tenstorrent','tesla','rivian','lucid','canoo','nikola','waymo','cruise','aurora','kodiak','nuro','joby','archer','wisk','lilium','boston dynamics','figure','apptronik','agility robotics','sarcos','divergent','velo3d','markforged','desktop metal','illumina','10x genomics']
};
const TARGET_ROLES=['chief of staff','biz ops','bizops','business operations','strategy and operations','strategy & operations','strategy & ops','revenue operations','revops','go-to-market','gtm','product operations','chief operating','coo','head of operations','director of operations','vp of operations','vp, operations','head of strategy','director of strategy','vp of strategy','vp, strategy','strategy manager','strategy director','strategy lead','strategy analyst','general manager','head of biz','director of biz','program manager','finance and operations','finance & operations','head of growth','director of growth'];
const SKIP_ROLES=['software engineer','senior software','staff software','principal engineer','data scientist','machine learning','ml engineer','data engineer','ux designer','ui designer','product designer','recruiter','talent acquisition','sourcer','talent coordinator','talent partner','talent advisor','accountant','lawyer','attorney','legal counsel','paralegal','sales development','sdr','bdr','account executive','account manager','customer success manager','customer success specialist','customer support','customer service','site reliability','devops','security engineer','investment banker','private equity','venture capital','physician','doctor','nurse','resident physician','medical student','law clerk','judicial','financial analyst','wealth advisor','wealth management'];

let expRecords=[], expFilter='all', expPage=1, expandedRow=null, rowMessages={};
let selectedRows=new Set();
let hideClosed=true, hideRecent=true;
let sortField='score', sortDir='desc';
const EXP_PAGE_SIZE=50;
let atPeopleMap={};

function toast(msg,dur=3000){
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),dur);
}

function switchTab(id,el){
  document.querySelectorAll('.panel').forEach(p=>p.classList.remove('active'));
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  document.getElementById('tab-'+id).classList.add('active');
  el.classList.add('active');
  if(id==='explorer'&&expRecords.length===0) loadExplorer();
}

async function fetchAllPeople(){
  let records=[], offset=null;
  do {
    let url=`https://api.airtable.com/v0/${AT_BASE}/${AT_PEOPLE}?pageSize=100`;
    if(offset) url+=`&offset=${offset}`;
    const res=await fetch(url,{headers:{'Authorization':`Bearer ${AT_TOKEN}`}});
    const data=await res.json();
    if(data.records) records=[...records,...data.records];
    offset=data.offset||null;
  } while(offset);
  return records;
}

async function loadExplorer(){
  document.getElementById('exp-table-wrap').innerHTML='<div class="loading">Loading from Airtable...</div>';
  try{
    expRecords=await fetchAllPeople();
    expPage=1;
    expRender();
  }catch(e){
    document.getElementById('exp-table-wrap').innerHTML='<div class="empty">Failed to load. Check token.</div>';
  }
}

function getLiUrl(r){
  const notes=r.fields['Notes']||'';
  const match=notes.match(/LinkedIn:\s*(https:\/\/[^\s|]+)/);
  return match?match[1]:'';
}

function getCompany(r){
  // Check linked Company field first, then Notes
  if(r.fields['Company'] && typeof r.fields['Company']==='string') return r.fields['Company'];
  const notes=r.fields['Notes']||'';
  const match=notes.match(/Company:\s*([^|]+)/);
  return match?match[1].trim():'';
}

function pillClass(s){
  if(s==='Consumer Tech') return 'p-consumer';
  if(s==='Platform Infra') return 'p-platform';
  if(s==='Physical World') return 'p-physical';
  if(s==='Other') return 'p-other';
  return 'p-none';
}

function statusPill(s){
  if(s==='Not Contacted') return 'p-notcontacted';
  if(s==='Sent') return 'p-sent';
  if(s==='Replied') return 'p-replied';
  if(s==='Meeting Booked') return 'p-meeting';
  if(s==='Active Interview') return 'p-interview';
  if(s==='Closed'||s==='Inactive') return 'p-closed';
  return 'p-notcontacted';
}

function warmthMultiplier(w){
  if(w==='Strong') return 2;
  if(w==='Warm') return 1.5;
  return 1;
}

function effectiveScore(r){
  const base=r.fields['Score']||0;
  const warmth=r.fields['Warmth']||'Cold';
  return Math.round(base * warmthMultiplier(warmth) * 10) / 10;
}

function isRecentlyTouched(r){
  const lt=r.fields['Last Touched'];
  if(!lt) return false;
  const days=(Date.now()-new Date(lt).getTime())/(1000*60*60*24);
  return days < 7;
}

function toggleClosed(){
  hideClosed=!hideClosed;
  const btn=document.getElementById('toggle-closed');
  btn.textContent=hideClosed?'Hide closed':'Show closed';
  btn.classList.toggle('on', hideClosed);
  expPage=1;expRender();
}

function toggleRecent(){
  hideRecent=!hideRecent;
  const btn=document.getElementById('toggle-recent');
  btn.textContent=hideRecent?'Hide recent':'Show recent';
  btn.classList.toggle('on', hideRecent);
  expPage=1;expRender();
}

function setExpFilter(f,el){
  expFilter=f;expPage=1;expandedRow=null;
  document.querySelectorAll('#tab-explorer .filter-btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  expRender();
}

function setSort(field){
  if(sortField===field) sortDir=sortDir==='desc'?'asc':'desc';
  else{sortField=field;sortDir='desc';}
  expRender();
}

function expFiltered(){
  const q=(document.getElementById('exp-search')?.value||'').toLowerCase();
  return expRecords.filter(r=>{
    const name=(r.fields['Name']||'').toLowerCase();
    const role=(r.fields['Role']||'').toLowerCase();
    const company=getCompany(r).toLowerCase();
    const notes=(r.fields['Notes']||'').toLowerCase();
    const matchQ=!q||(name+role+company+notes).includes(q);
    const sector=r.fields['Sector']||'';
    const status=r.fields['Status']||'';
    if(hideClosed&&(status==='Closed'||status==='Inactive')) return false;
    if(hideRecent&&isRecentlyTouched(r)) return false;
    if(!matchQ) return false;
    if(expFilter==='all') return true;
    if(expFilter==='Replied') return status==='Replied';
    return sector===expFilter;
  }).sort((a,b)=>{
    if(expFilter==='due'){
      const av=a.fields['Next Action Date']||'';
      const bv=b.fields['Next Action Date']||'';
      return av<bv?-1:av>bv?1:0;
    }
    let av, bv;
    if(sortField==='score'){av=effectiveScore(a);bv=effectiveScore(b);}
    else if(sortField==='name'){av=(a.fields['Name']||'').toLowerCase();bv=(b.fields['Name']||'').toLowerCase();}
    else if(sortField==='status'){av=a.fields['Status']||'';bv=b.fields['Status']||'';}
    else if(sortField==='last'){av=a.fields['Last Touched']||'';bv=b.fields['Last Touched']||'';}
    else if(sortField==='nad'){av=a.fields['Next Action Date']||'';bv=b.fields['Next Action Date']||'';}
    else{av=effectiveScore(a);bv=effectiveScore(b);}
    if(av<bv) return sortDir==='desc'?1:-1;
    if(av>bv) return sortDir==='desc'?-1:1;
    return 0;
  });
}

function clearSelection(){
  selectedRows.clear();
  updateBulkBar();
  expRender();
}

function updateBulkBar(){
  const bar=document.getElementById('bulk-bar');
  const label=document.getElementById('bulk-label');
  if(selectedRows.size>0){
    bar.classList.add('visible');
    label.textContent=`${selectedRows.size} selected`;
  } else {
    bar.classList.remove('visible');
  }
}

function toggleSelect(id, e){
  e.stopPropagation();
  if(selectedRows.has(id)) selectedRows.delete(id);
  else selectedRows.add(id);
  updateBulkBar();
  // Update just the checkbox without full re-render
  const cb=document.getElementById('cb-'+id);
  if(cb) cb.checked=selectedRows.has(id);
}

function toggleSelectAll(e){
  const all=expFiltered().slice((expPage-1)*EXP_PAGE_SIZE,expPage*EXP_PAGE_SIZE);
  if(e.target.checked){
    all.forEach(r=>selectedRows.add(r.id));
  } else {
    all.forEach(r=>selectedRows.delete(r.id));
  }
  updateBulkBar();
  expRender();
}

async function bulkUpdate(status){
  if(selectedRows.size===0) return;
  const ids=[...selectedRows];
  const today=new Date().toISOString().split('T')[0];
  const plusSeven=new Date(Date.now()+7*24*60*60*1000).toISOString().split('T')[0];
  
  const fields={'Status':status,'Last Touched':today};
  const plus1=new Date(Date.now()+1*24*60*60*1000).toISOString().split('T')[0];
  const plus3=new Date(Date.now()+3*24*60*60*1000).toISOString().split('T')[0];
  if(status==='Sent'){
    fields['Next Action']='Follow up if no response';
    fields['Next Action Date']=plusSeven;
  } else if(status==='Replied'){
    fields['Next Action']='Schedule call';
    fields['Next Action Date']=plus3;
  } else if(status==='Meeting Booked'){
    fields['Next Action']='Prep and confirm';
    fields['Next Action Date']=plus1;
  } else if(status==='Active Interview'){
    fields['Next Action']='Prep for interview';
    fields['Next Action Date']=plus1;
  } else if(status==='Closed'){
    fields['Next Action']='';
    fields['Next Action Date']='';
  }

  toast(`Updating ${ids.length} records...`);
  let done=0;
  for(let i=0;i<ids.length;i++){
    try{
      await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_PEOPLE}/${ids[i]}`,{
        method:'PATCH',
        headers:{'Authorization':`Bearer ${AT_TOKEN}`,'Content-Type':'application/json'},
        body:JSON.stringify({fields})
      });
      // Update local record
      const r=expRecords.find(x=>x.id===ids[i]);
      if(r){
        r.fields['Status']=status;
        if(fields['Last Touched']) r.fields['Last Touched']=today;
        if(fields['Next Action']!==undefined) r.fields['Next Action']=fields['Next Action'];
        if(fields['Next Action Date']!==undefined) r.fields['Next Action Date']=fields['Next Action Date'];
      }
      done++;
    }catch(e){console.error('Failed to update',ids[i]);}
    if(i%5===4) await new Promise(r=>setTimeout(r,1000));
  }
  toast(`Updated ${done} of ${ids.length} records`);
  selectedRows.clear();
  updateBulkBar();
  expRender();
}


function genMsg(r){
  const fn=(r.fields['Name']||'').split(' ')[0];
  const co=getCompany(r)||'your company';
  const opts=[
    `Hey ${fn} — hope things are going well. I'm exploring Chief of Staff and BizOps roles at high-growth companies and noticed you're doing great work at ${co}. I've spent 6 years in ops and strategy at Braze, ASAPP, and Artsy — would love to swap notes if you're open to a quick 20 mins?`,
    `Hi ${fn} — your work at ${co} caught my eye. I'm in the middle of a search for CoS / Strategy & Ops roles and have been building in this space for 6 years across Braze, ASAPP, and Artsy. Would love to connect if you have 20 mins to swap notes?`,
    `${fn} — reaching out because your path at ${co} is interesting. I'm exploring my next move into Chief of Staff or BizOps. Six years across Braze, ASAPP, and Artsy on the ops and strategy side — any chance you'd be up for a quick call?`
  ];
  return opts[Math.floor(Math.random()*opts.length)];
}

async function markSent(recordId, name){
  try{
    const today=new Date().toISOString().split('T')[0];
    const plusSeven=new Date(Date.now()+7*24*60*60*1000).toISOString().split('T')[0];
    await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_PEOPLE}/${recordId}`,{
      method:'PATCH',
      headers:{'Authorization':`Bearer ${AT_TOKEN}`,'Content-Type':'application/json'},
      body:JSON.stringify({fields:{
        'Status':'Sent',
        'Last Touched':today,
        'Next Action':'Follow up',
        'Next Action Date':plusSeven
      }})
    });
    // Update local record
    const r=expRecords.find(x=>x.id===recordId);
    if(r){r.fields['Status']='Sent';r.fields['Last Touched']=today;}
    expandedRow=null;
    toast(`${name} marked sent`);
    expRender();
  }catch(e){toast('Error updating Airtable');}
}

function toggleRow(id){
  if(expandedRow===id){expandedRow=null;}
  else{
    expandedRow=id;
    const r=expRecords.find(x=>x.id===id);
    if(r&&!rowMessages[id]) rowMessages[id]=genMsg(r);
  }
  expRender();
}

function regenRowMsg(id){
  const r=expRecords.find(x=>x.id===id);
  if(r) rowMessages[id]=genMsg(r);
  expRender();
}

function copyRowMsg(id){
  if(navigator.clipboard) navigator.clipboard.writeText(rowMessages[id]);
  toast('Message copied');
}

function sortArrow(field){
  if(sortField!==field) return'<span style="color:#ddd;margin-left:4px">↕</span>';
  return sortDir==='desc'?'<span style="margin-left:4px">↓</span>':'<span style="margin-left:4px">↑</span>';
}

function expRender(){
  const all=expFiltered();
  const pages=Math.ceil(all.length/EXP_PAGE_SIZE);
  if(expPage>pages&&pages>0) expPage=1;
  const slice=all.slice((expPage-1)*EXP_PAGE_SIZE,expPage*EXP_PAGE_SIZE);

  const total=expRecords.length;
  const closed=expRecords.filter(r=>['Closed','Inactive'].includes(r.fields['Status']||'')).length;
  document.getElementById('exp-label').textContent=`Showing ${all.length} of ${total} contacts (${closed} closed hidden)`;

  // Init toggle button states
  document.getElementById('toggle-closed').classList.toggle('on',hideClosed);
  document.getElementById('toggle-closed').textContent=hideClosed?'Hide closed':'Show closed';
  document.getElementById('toggle-recent').classList.toggle('on',hideRecent);
  document.getElementById('toggle-recent').textContent=hideRecent?'Hide recent':'Show recent';

  if(!slice.length){
    document.getElementById('exp-table-wrap').innerHTML='<div class="empty">No contacts match.</div>';
    document.getElementById('exp-pagination').innerHTML='';
    return;
  }

  let rows='';
  slice.forEach(r=>{
    const id=r.id;
    const name=r.fields['Name']||'';
    const role=r.fields['Role']||'';
    const sector=r.fields['Sector']||'';
    const rawScore=r.fields['Score']||0;
    const effScore=effectiveScore(r);
    const status=r.fields['Status']||'';
    const warmth=r.fields['Warmth']||'Cold';
    const lastTouched=r.fields['Last Touched']||'';
    const liUrl=getLiUrl(r);
    const company=getCompany(r);
    const nad=r.fields['Next Action Date']||'';
    const nextAction=r.fields['Next Action']||'';
    const isExpanded=expandedRow===id;
    const warmthClass=warmth==='Strong'?'warmth-strong':warmth==='Warm'?'warmth-warm':'warmth-cold';
    const scoreClass=effScore>=7?'score-high':effScore>=4?'score-mid':'score-low';

    rows+=`<tr class="data-row${isExpanded?' expanded':''}" onclick="toggleRow('${id}')">
      <td onclick="event.stopPropagation()" style="width:32px"><input type="checkbox" class="row-check" id="cb-${id}" ${selectedRows.has(id)?'checked':''} onclick="toggleSelect('${id}',event)"></td>
      <td class="td-name">${name}</td>
      <td class="td-company">${company||'—'}</td>
      <td class="td-role" title="${role}">${role||'—'}</td>
      <td><span class="pill ${pillClass(sector)}">${sector||'—'}</span></td>
      <td class="${scoreClass}" style="font-weight:500">${effScore||'—'}</td>
      <td><span class="${warmthClass}">${warmth}</span></td>
      <td><span class="pill ${statusPill(status)}">${status||'—'}</span></td>
      <td style="font-size:12px;color:#888">${lastTouched||'—'}</td>
      <td>${liUrl?`<a href="${liUrl}" target="_blank" onclick="event.stopPropagation()" style="font-size:12px;color:#2563eb">↗</a>`:'—'}</td>
    </tr>`;

    if(isExpanded){
      rows+=`<tr class="expand-row">
        <td colspan="12">
          <div class="expand-inner">
            <div class="msg-box" contenteditable="true" id="msg-${id}">${rowMessages[id]||''}</div>
            <div class="row-actions">
              <button class="btn primary" onclick="event.stopPropagation();markSent('${id}','${name.replace(/'/g,"\\'")}')">Mark sent</button>
              <button class="btn" onclick="event.stopPropagation();regenRowMsg('${id}')">New draft</button>
              <button class="btn" onclick="event.stopPropagation();copyRowMsg('${id}')">Copy</button>
              ${liUrl?`<a href="${liUrl}" target="_blank" class="btn" onclick="event.stopPropagation()">↗ LinkedIn</a>`:''}
              <button class="btn" onclick="event.stopPropagation();toggleRow('${id}')">Collapse</button>
            </div>
          </div>
        </td>
      </tr>`;
    }
  });

  document.getElementById('exp-table-wrap').innerHTML=`<table>
    <thead><tr>
      <th style="width:32px"><input type="checkbox" class="row-check" id="cb-all" onclick="toggleSelectAll(event)"></th>
      <th onclick="setSort('name')">Name${sortArrow('name')}</th>
      <th>Company</th>
      <th>Role</th>
      <th>Sector</th>
      <th onclick="setSort('score')">Score${sortArrow('score')}</th>
      <th>Warmth</th>
      <th onclick="setSort('status')">Status${sortArrow('status')}</th>
      <th onclick="setSort('last')">Last touched${sortArrow('last')}</th>
      <th onclick="setSort('nad')">Next action date${sortArrow('nad')}</th>
      <th>Next action</th>
      <th>Link</th>
    </tr></thead>
    <tbody>${rows}</tbody>
  </table>`;

  const pg=document.getElementById('exp-pagination');
  if(pages<=1){pg.innerHTML='';return;}
  let btns='';
  const start=Math.max(1,expPage-3);
  const end=Math.min(pages,expPage+3);
  for(let i=start;i<=end;i++){
    btns+=`<button class="page-btn${i===expPage?' active':''}" onclick="expPage=${i};expRender()">${i}</button>`;
  }
  pg.innerHTML=`<span class="page-info">Page ${expPage} of ${pages}</span>${btns}`;
}

// UPSERT
function matchSector(co, kws){
  return kws.some(k=>{
    if(k.length<=5){return new RegExp('\\b'+k.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')+'\\b').test(co);}
    return co.includes(k);
  });
}

function scoreConn(name, company, position){
  const co=(company||'').toLowerCase();
  const po=(position||'').toLowerCase();
  const skip=SKIP_ROLES.some(r=>po.includes(r));
  if(skip) return{sector:null,roleMatch:false,skip:true,score:0};
  let sector=null;
  for(const[s,kws]of Object.entries(TARGET_SECTORS)){
    if(matchSector(co,kws)){sector=s;break;}
  }
  const rm=TARGET_ROLES.some(r=>po.includes(r));
  if(!sector&&!rm) return{sector:null,roleMatch:false,skip:false,score:0};
  const displaySector=sector||'Other';
  const sc=(sector?2:0)+(rm?2:0)+(sector&&rm?1:0);
  return{sector:displaySector,roleMatch:rm,skip:false,score:sc};
}

function parseLI(text){
  const lines=text.split('\n');
  const hi=lines.findIndex(l=>l.includes('First Name'));
  if(hi<0)return[];
  const rows=parseCSV(lines.slice(hi).join('\n'));
  return rows.filter(r=>r['First Name']&&r['Last Name']).map(r=>({
    name:r['First Name'].trim()+' '+r['Last Name'].trim(),
    company:(r['Company']||'').trim(),
    position:(r['Position']||'').trim(),
    url:(r['URL']||'').trim()
  }));
}

function parseCSV(text){
  const lines=text.split('\n');
  if(!lines.length)return[];
  const headers=splitLine(lines[0]);
  return lines.slice(1).map(l=>{
    const v=splitLine(l);const o={};
    headers.forEach((h,i)=>o[h.trim()]=(v[i]||'').trim());
    return o;
  }).filter(r=>Object.values(r).some(v=>v));
}

function splitLine(line){
  const r=[];let c='';let q=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){q=!q;}
    else if(line[i]===','&&!q){r.push(c);c='';}
    else{c+=line[i];}
  }
  r.push(c);return r;
}

async function buildAtMap(){
  toast('Loading Airtable records...');
  const all=await fetchAllPeople();
  atPeopleMap={};
  all.forEach(r=>{
    const name=(r.fields['Name']||'').toLowerCase().trim();
    if(name) atPeopleMap[name]=r.id;
  });
  return atPeopleMap;
}

document.getElementById('li-upload').addEventListener('change',async e=>{
  const file=e.target.files[0];if(!file)return;
  document.getElementById('upsert-status').textContent='Parsing CSV...';
  document.getElementById('upsert-progress-bar').style.display='block';
  document.getElementById('upsert-progress-fill').style.width='10%';
  const reader=new FileReader();
  reader.onload=async ev=>{
    const connections=parseLI(ev.target.result);
    const scored=connections.map(c=>({...c,...scoreConn(c.name,c.company,c.position)}))
      .filter(c=>!c.skip&&(c.sector||c.roleMatch));
    document.getElementById('upsert-status').textContent=`Found ${scored.length} scored connections. Loading Airtable...`;
    document.getElementById('upsert-progress-fill').style.width='20%';
    document.getElementById('us-csv').textContent=scored.length;
    document.getElementById('upsert-stats').style.display='grid';
    await buildAtMap();
    document.getElementById('upsert-progress-fill').style.width='40%';
    let newCount=0, updatedCount=0, skippedCount=0;
    const results=[];
    const total=scored.length;
    for(let i=0;i<scored.length;i++){
      const c=scored[i];
      const key=c.name.toLowerCase().trim();
      const existingId=atPeopleMap[key];
      const progress=40+Math.round((i/total)*55);
      document.getElementById('upsert-progress-fill').style.width=progress+'%';
      document.getElementById('upsert-status').textContent=`Processing ${i+1} of ${total}...`;
      if(existingId){
        try{
          await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_PEOPLE}/${existingId}`,{
            method:'PATCH',
            headers:{'Authorization':`Bearer ${AT_TOKEN}`,'Content-Type':'application/json'},
            body:JSON.stringify({fields:{
              'Score':c.score,
              'Sector':c.sector||''
            }})
          });
          updatedCount++;
          results.push({name:c.name,type:'update',company:c.company});
        }catch(e){skippedCount++;results.push({name:c.name,type:'skip',company:c.company});}
      } else {
        try{
          await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_PEOPLE}`,{
            method:'POST',
            headers:{'Authorization':`Bearer ${AT_TOKEN}`,'Content-Type':'application/json'},
            body:JSON.stringify({fields:{
              'Name':c.name,
              'Role':c.position,
              'Motion':'Leverage',
              'Warmth':'Cold',
              'Status':'Not Contacted',
              'Score':c.score,
              'Sector':c.sector||'',
              'Notes':`Company: ${c.company} | LinkedIn: ${c.url}`
            }})
          });
          newCount++;
          results.push({name:c.name,type:'new',company:c.company});
        }catch(e){skippedCount++;results.push({name:c.name,type:'skip',company:c.company});}
      }
      if(i%5===4) await new Promise(r=>setTimeout(r,1000));
    }
    document.getElementById('upsert-progress-fill').style.width='100%';
    document.getElementById('upsert-status').textContent=`Done — ${newCount} new, ${updatedCount} updated, ${skippedCount} skipped`;
    document.getElementById('us-new').textContent=newCount;
    document.getElementById('us-updated').textContent=updatedCount;
    document.getElementById('us-skipped').textContent=skippedCount;
    document.getElementById('upsert-results').innerHTML=results.slice(0,20).map(r=>`
      <div class="result-row result-${r.type}">
        <span>${r.name} <span style="color:#888;font-size:12px">${r.company}</span></span>
        <span class="tag tag-${r.type}">${r.type}</span>
      </div>
    `).join('');
    toast(`Sync complete — ${newCount} new, ${updatedCount} updated`);
  };
  reader.readAsText(file);
});

async function bulkWarmth(warmth){
  if(selectedRows.size===0) return;
  const ids=[...selectedRows];
  toast(`Setting ${ids.length} contacts to ${warmth}...`);
  let done=0;
  for(let i=0;i<ids.length;i++){
    try{
      await fetch(`https://api.airtable.com/v0/${AT_BASE}/${AT_PEOPLE}/${ids[i]}`,{
        method:'PATCH',
        headers:{'Authorization':`Bearer ${AT_TOKEN}`,'Content-Type':'application/json'},
        body:JSON.stringify({fields:{'Warmth':warmth}})
      });
      const r=expRecords.find(x=>x.id===ids[i]);
      if(r) r.fields['Warmth']=warmth;
      done++;
    }catch(e){console.error('Failed',ids[i]);}
    if(i%5===4) await new Promise(r=>setTimeout(r,1000));
  }
  toast(`Updated ${done} contacts to ${warmth}`);
  selectedRows.clear();
  updateBulkBar();
  expRender();
}
