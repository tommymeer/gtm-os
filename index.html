let existingPeople = new Set(["Jamie Doheny", "Janet Jin", "Harikrishna Menon", "Pranav Panchagni", "Michael Riordan", "Tamir Melinek", "Colleen O'Malley", "Bryant Lee", "Rohan Shah", "Jiyoung Chang", "Madison Lee", "Jeffrey Monahan", "Rosemary Williams", "Jacob S\u00f6derstjerna", "Sofia Cianchi", "Richard Lopez", "Lu Zhang", "Andrea Fang", "Casey Mulroy", "Alisa Ming Yi Ng", "Alicia Lee", "Ferris Wang", "Sarah Super", "Raleigh Ann Gray", "Andrew Thompson", "Matthew Roknich", "Benjamin Levick", "Kelly Chou", "Austin Meyer", "Frank Chiang", "Gabi Lustig", "Chase Mathew", "Mikael Woxblom", "Sam Lopez III", "Zachary Landesberg", "Clara Pomi", "Gaurab Bose", "Julisa Salas", "Vaishishtya Naik", "Chris D'Angelo", "Karan Chachlani", "Andrew Antos", "Alex Menendez", "Chris Carey", "Landon Mossberg", "Ryan Alshak", "Quyen Tien", "George Eliadis", "Stephen Varghese", "Emil Dyrvig"].map(n => n.toLowerCase()));
let currentFilter = 'all';
let sentMap = {};
let expandedMap = {};
let messages = {};

function scoreConnection(c) {
  const co = (c.company||'').toLowerCase();
  const po = (c.position||'').toLowerCase();
  let sector = null;
  for (const [s, kws] of Object.entries(TARGET_SECTORS)) {
    if (kws.some(k => co.includes(k))) { sector = s; break; }
  }
  const roleMatch = TARGET_ROLES.some(r => po.includes(r));
  const skip = SKIP_ROLES.some(r => po.includes(r));
  const score = (sector ? 2 : 0) + (roleMatch ? 2 : 0) + (sector && roleMatch ? 1 : 0);
  return { ...c, sector, role_match: roleMatch, skip, score };
}

function parseLinkedInCSV(text) {
  const lines = text.split('\n');
  let headerIdx = lines.findIndex(l => l.includes('First Name'));
  if (headerIdx < 0) return [];
  const rows = parseCSV(lines.slice(headerIdx).join('\n'));
  return rows.filter(r => r['First Name'] && r['Last Name']).map(r => ({
    name: r['First Name'].trim() + ' ' + r['Last Name'].trim(),
    company: (r['Company']||'').trim(),
    position: (r['Position']||'').trim(),
    url: (r['URL']||'').trim(),
    connected_on: (r['Connected On']||'').trim()
  }));
}

function parseAirtableCSV(text) {
  const rows = parseCSV(text);
  return rows.map(r => (r['Name']||'').trim()).filter(Boolean);
}

function parseCSV(text) {
  const lines = text.split('\n');
  if (!lines.length) return [];
  const headers = splitCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = splitCSVLine(line);
    const obj = {};
    headers.forEach((h,i) => obj[h.trim()] = (vals[i]||'').trim());
    return obj;
  }).filter(r => Object.values(r).some(v => v));
}

function splitCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') { inQ = !inQ; }
    else if (line[i] === ',' && !inQ) { result.push(cur); cur = ''; }
    else { cur += line[i]; }
  }
  result.push(cur);
  return result;
}

function refreshConnections(raw) {
  const parsed = parseLinkedInCSV(raw);
  const scored = parsed.map(scoreConnection).filter(c => !c.skip && !existingPeople.has(c.name.toLowerCase()) && (c.sector || c.role_match));
  scored.sort((a,b) => b.score - a.score);
  allConnections = scored;
  sentMap = {}; expandedMap = {}; messages = {};
}

document.getElementById('li-upload').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    refreshConnections(ev.target.result);
    document.getElementById('upload-status').textContent = `LinkedIn CSV loaded — ${allConnections.length} scored connections`;
    render();
  };
  reader.readAsText(file);
});

document.getElementById('at-upload').addEventListener('change', e => {
  const file = e.target.files[0]; if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    const names = parseAirtableCSV(ev.target.result);
    existingPeople = new Set(names.map(n => n.toLowerCase()));
    allConnections = allConnections.filter(c => !existingPeople.has(c.name.toLowerCase()));
    document.getElementById('upload-status').textContent = `Airtable CSV loaded — ${names.length} existing people excluded`;
    render();
  };
  reader.readAsText(file);
});

function getInitials(name) { return name.split(' ').map(n=>n[0]).join('').slice(0,2).toUpperCase(); }

function getSectorLabel(s) { return s === 'consumer_tech' ? 'Consumer tech' : s === 'platform_infra' ? 'Platform infra' : s === 'physical_world' ? 'Physical world' : null; }

function getAvatarClass(s) { return s === 'consumer_tech' ? 'av-consumer' : s === 'platform_infra' ? 'av-platform' : s === 'physical_world' ? 'av-physical' : 'av-other'; }

function getBadgeClass(s) { return s === 'consumer_tech' ? 'b-consumer' : s === 'platform_infra' ? 'b-platform' : s === 'physical_world' ? 'b-physical' : 'b-role'; }

function generateMessage(c) {
  const fn = c.name.split(' ')[0];
  const opts = [
    `Hey ${fn} — hope things are going well. I'm currently exploring Chief of Staff and BizOps roles at high-growth companies, and noticed you're doing great work at ${c.company}. I've spent 6 years in ops and strategy at Braze, ASAPP, and Artsy — would love to swap notes if you're open to a quick 20 mins?`,
    `Hi ${fn} — your work at ${c.company} caught my eye. I'm in the middle of a search for CoS / Strategy & Ops roles and have been building in this space for 6 years across Braze, ASAPP, and Artsy. Would love to connect if you have 20 mins to swap notes?`,
    `${fn} — reaching out because your path at ${c.company} is interesting. I'm exploring my next move into Chief of Staff or BizOps at a high-growth company. Six years across Braze, ASAPP, and Artsy on the ops and strategy side — any chance you'd be up for a quick call?`
  ];
  return opts[Math.floor(Math.random()*opts.length)];
}

function filtered() {
  return allConnections.filter(c => {
    if (sentMap[c.name]) return false;
    if (currentFilter === 'all') return true;
    if (currentFilter === 'top') return c.score === 5;
    if (currentFilter === 'role_only') return c.role_match && !c.sector;
    return c.sector === currentFilter;
  });
}

function setFilter(f, el) {
  currentFilter = f;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
  render();
}

function shuffleAll() {
  for (let i = allConnections.length-1; i>0; i--) {
    const j = Math.floor(Math.random()*(i+1));
    [allConnections[i],allConnections[j]] = [allConnections[j],allConnections[i]];
  }
  render();
}

function toggleExpand(name) {
  if (expandedMap[name]) { delete expandedMap[name]; }
  else { expandedMap[name] = true; if (!messages[name]) messages[name] = generateMessage(allConnections.find(c=>c.name===name)); }
  render();
}

function regenerate(name) {
  messages[name] = generateMessage(allConnections.find(c=>c.name===name));
  render();
}

function copyMsg(name) {
  if (navigator.clipboard) navigator.clipboard.writeText(messages[name]);
}

function markSent(name) {
  sentMap[name] = true;
  delete expandedMap[name];
  render();
}

function render() {
  const list = filtered().slice(0,20);
  const total = allConnections.length;
  const top = allConnections.filter(c=>c.score===5).length;
  const sent = Object.keys(sentMap).length;
  const inSystem = [...existingPeople].length;

  document.getElementById('stats').innerHTML = `
    <div class="stat"><div class="stat-label">Total matches</div><div class="stat-value">${total}</div></div>
    <div class="stat"><div class="stat-label">Top matches</div><div class="stat-value">${top}</div></div>
    <div class="stat"><div class="stat-label">In system</div><div class="stat-value">${inSystem}</div></div>
    <div class="stat"><div class="stat-label">Sent today</div><div class="stat-value">${sent}</div></div>
  `;

  document.getElementById('queue-label').textContent = `Showing ${list.length} of ${filtered().length + sent} connections`;

  if (!list.length) {
    document.getElementById('contact-list').innerHTML = '<div class="empty">No connections match this filter.</div>';
    return;
  }

  document.getElementById('contact-list').innerHTML = list.map(c => {
    const isExpanded = expandedMap[c.name];
    const sLabel = getSectorLabel(c.sector);
    const aClass = getAvatarClass(c.sector);
    const bClass = getBadgeClass(c.sector);
    const isTop = c.score === 5;

    return `<div class="card">
      <div class="card-top">
        <div class="avatar ${aClass}">${getInitials(c.name)}</div>
        <div class="card-info">
          <div class="card-name">${c.name}</div>
          <div class="card-meta">${c.position} · ${c.company}</div>
          <div class="badges">
            ${isTop ? '<span class="badge b-top">Top match</span>' : ''}
            ${sLabel ? `<span class="badge ${bClass}">${sLabel}</span>` : ''}
            ${c.role_match ? '<span class="badge b-role">Role match</span>' : ''}
          </div>
        </div>
        <a href="${c.url}" class="li-link" target="_blank">↗ View</a>
      </div>
      ${isExpanded ? `
        <div class="msg-box" contenteditable="true" id="msg-${c.name.replace(/\s/g,'_')}">${messages[c.name]}</div>
        <div class="actions">
          <button class="btn primary" onclick="markSent('${c.name}')">Mark sent</button>
          <button class="btn" onclick="regenerate('${c.name}')">New draft</button>
          <button class="btn" onclick="copyMsg('${c.name}')">Copy</button>
          <button class="btn" onclick="toggleExpand('${c.name}')">Collapse</button>
        </div>
        <div class="sent-note">After sending: add to Airtable People — Status: Sent, Motion: Leverage, Next Action Date: +7 days</div>
      ` : `
        <div class="actions" style="margin-top:10px;">
          <button class="btn primary" onclick="toggleExpand('${c.name}')">Draft message</button>
          <a href="${c.url}" class="btn" target="_blank">↗ LinkedIn</a>
        </div>
      `}
    </div>`;
  }).join('');
}

render();
</script>
